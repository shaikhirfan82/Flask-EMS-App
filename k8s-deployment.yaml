apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-ems
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-ems
  template:
    metadata:
      labels:
        app: flask-ems
    spec:
      containers:
      - name: flask-ems
        image: yourdockerhub/flask-ems:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-ems-service
spec:
  type: NodePort
  selector:
    app: flask-ems
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050
